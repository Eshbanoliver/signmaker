<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#121824" />
      <stop offset="100%" stop-color="#090d16" />
    </radialGradient>
    
    <!-- Neon Gradients -->
    <linearGradient id="cyanNeon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#0e98ba" />
    </linearGradient>
    <linearGradient id="pinkNeon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#ff6b6b" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur1" />
      <feGaussianBlur stdDeviation="6" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur1" />
      <feGaussianBlur stdDeviation="6" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="#1a2333" stroke-width="4" />
  
  <!-- Grid pattern overlay for a tech/mesh feel -->
  <g opacity="0.07">
    <path d="M 0,64 L 512,64 M 0,128 L 512,128 M 0,192 L 512,192 M 0,256 L 512,256 M 0,320 L 512,320 M 0,384 L 512,384 M 0,448 L 512,448" stroke="#ffffff" stroke-width="2" />
    <path d="M 64,0 L 64,512 M 128,0 L 128,512 M 192,0 L 192,512 M 256,0 L 256,512 M 320,0 L 320,512 M 384,0 L 384,512 M 448,0 L 448,512" stroke="#ffffff" stroke-width="2" />
  </g>

  <!-- Outer Neon Frame (Sign Board Mockup) -->
  <rect x="64" y="64" width="384" height="384" rx="48" fill="none" stroke="url(#cyanNeon)" stroke-width="8" filter="url(#glowCyan)" opacity="0.8" />
  <rect x="74" y="74" width="364" height="364" rx="38" fill="none" stroke="#121824" stroke-width="4" />
  
  <!-- Screws/bolts on frame corner for realism -->
  <circle cx="96" cy="96" r="8" fill="#4a5568" />
  <circle cx="416" cy="96" r="8" fill="#4a5568" />
  <circle cx="96" cy="416" r="8" fill="#4a5568" />
  <circle cx="416" cy="416" r="8" fill="#4a5568" />

  <!-- Logo Graphics: Glowing S & M Neon Tubes -->
  <g transform="translate(128, 128)">
    <!-- Abstract LED "S" shape path (Cyan) -->
    <path d="M 190,50 C 190,20 140,20 128,20 C 60,20 50,70 128,100 C 200,128 190,180 128,180 C 110,180 60,180 60,150" 
          fill="none" stroke="url(#cyanNeon)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowCyan)" />
          
    <!-- Abstract LED "M" shape path (Pink/Red Accent) -->
    <path d="M 80,210 L 80,110 L 128,160 L 176,110 L 176,210" 
          fill="none" stroke="url(#pinkNeon)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowPink)" />
  </g>
  
  <!-- Small glowing indicator light in center -->
  <circle cx="256" cy="256" r="16" fill="url(#cyanNeon)" filter="url(#glowCyan)" />
  <circle cx="256" cy="256" r="6" fill="#ffffff" />
</svg>