<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="100%" height="100%">
  <defs>
    <!-- Neon Gradients -->
    <linearGradient id="logoCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#0e98ba" />
    </linearGradient>
    <linearGradient id="logoPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#ff6b6b" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="logoGlowCyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur1" />
      <feGaussianBlur stdDeviation="2" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="logoGlowPink" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur1" />
      <feGaussianBlur stdDeviation="2" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Glowing Icon Graphic on the Left -->
  <g transform="translate(10, 10)">
    <!-- Frame -->
    <rect x="5" y="5" width="90" height="90" rx="18" fill="none" stroke="url(#logoCyan)" stroke-width="3.5" filter="url(#logoGlowCyan)" opacity="0.6" />
    
    <!-- S Shape -->
    <path d="M 75,30 C 75,22 58,22 55,22 C 32,22 28,42 55,50 C 82,58 78,78 55,78 C 45,78 30,78 30,70" 
          fill="none" stroke="url(#logoCyan)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#logoGlowCyan)" />
          
    <!-- M Shape -->
    <path d="M 38,82 L 38,62 L 55,72 L 72,62 L 72,82" 
          fill="none" stroke="url(#logoPink)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#logoGlowPink)" />
  </g>

  <!-- Typography on the Right -->
  <!-- "SIGN MAKER" main text in modern sans-serif with slight metallic/neon glow -->
  <text x="120" y="55" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="800" font-size="34" fill="#ffffff" letter-spacing="1">
    SIGN MAKER
  </text>
  
  <!-- "led board" subtitle glowing in cyan -->
  <text x="120" y="88" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="700" font-size="22" fill="url(#logoCyan)" filter="url(#logoGlowCyan)" letter-spacing="2">
    led board
  </text>
</svg>
